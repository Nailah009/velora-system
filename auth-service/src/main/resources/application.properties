server.port=8080
spring.application.name=auth-service
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
springdoc.swagger-ui.path=/swagger-ui.html
app.jwt.secret=${JWT_SECRET:velora-super-secret-key-for-jwt-hs256-minimum-32-bytes}
app.jwt.expiration-ms=86400000
