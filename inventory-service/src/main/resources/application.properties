server.port=8082
spring.application.name=inventory-service
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
springdoc.swagger-ui.path=/swagger-ui.html
app.jwt.secret=${JWT_SECRET:velora-super-secret-key-for-jwt-hs256-minimum-32-bytes}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topics.payment-failed=velora.payment.failed.topic
app.kafka.topics.shipment-failed=velora.shipment.failed.topic
app.kafka.topics.payment-refunded=velora.payment.refunded.topic
